version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: rifa_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: rifa_online
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rifa_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rifa_online"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: rifa_backend_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rifa_online
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: dev_secret_key_nao_usar_em_producao
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 5242880
      FRONTEND_URL: http://localhost:5173
      ADMIN_EMAIL: admin@rifa.com
      ADMIN_PASSWORD: admin123
      ADMIN_NAME: Administrador
    volumes:
      - ./backend/src:/app/src
      - uploads_dev_data:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - rifa_dev_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rifa_frontend_dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    networks:
      - rifa_dev_network
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  uploads_dev_data:

networks:
  rifa_dev_network:
    driver: bridge
